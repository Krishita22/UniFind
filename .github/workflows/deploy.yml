name: Build & Deploy Flutter Web

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build Flutter web
        working-directory: unifind_flutter
        run: flutter build web --base-href /~ivanovs1/UniFind/

      - name: Deploy to cPanel via File Manager API
        run: |
          cd unifind_flutter/build/web

          # Delete old files first
          curl -sk -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASS }}" \
            "https://cyan.csam.montclair.edu:2083/execute/Fileman/delete" \
            --data "dir=/home/ivanovs1/public_html&names=UniFind" || true

          # Create fresh UniFind directory
          curl -sk -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASS }}" \
            "https://cyan.csam.montclair.edu:2083/execute/Fileman/mkdir" \
            --data "path=/home/ivanovs1/public_html&name=UniFind"

          # Upload each file
          find . -type f | while read file; do
            filepath="${file#./}"
            dir=$(dirname "$filepath")

            # Create subdirectory if needed
            if [ "$dir" != "." ]; then
              curl -sk -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASS }}" \
                "https://cyan.csam.montclair.edu:2083/execute/Fileman/mkdir" \
                --data "path=/home/ivanovs1/public_html/UniFind&name=$dir" || true
            fi

            # Upload file
            curl -sk -u "${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_PASS }}" \
              "https://cyan.csam.montclair.edu:2083/execute/Fileman/upload_files" \
              -F "dir=/home/ivanovs1/public_html/UniFind/$dir" \
              -F "file-1=@$file"
          done

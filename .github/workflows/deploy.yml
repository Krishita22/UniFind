name: Build & Deploy Flutter Web

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build Flutter web
        working-directory: unifind_flutter
        run: |
          flutter clean
          flutter build web --base-href /~ivanovs1/UniFind/

      - name: Deploy to cPanel via File Manager API
        run: |
          cd unifind_flutter/build/web

          AUTH="-H 'Authorization: Basic $(echo -n ${{ secrets.FTP_USER }}:${{ secrets.FTP_PASS }} | base64)'"

          # Delete old files first
          curl -sk -k \
            -H "Authorization: Basic $(echo -n '${{ secrets.FTP_USER }}:${{ secrets.FTP_PASS }}' | base64)" \
            "https://cyan.csam.montclair.edu:2083/execute/Fileman/delete?dir=%2Fhome%2Fivanovs1%2Fpublic_html&names=UniFind" || true

          # Create fresh UniFind directory
          curl -sk -k \
            -H "Authorization: Basic $(echo -n '${{ secrets.FTP_USER }}:${{ secrets.FTP_PASS }}' | base64)" \
            "https://cyan.csam.montclair.edu:2083/execute/Fileman/mkdir?path=%2Fhome%2Fivanovs1%2Fpublic_html&name=UniFind"

          # Upload each file
          find . -type f | while read file; do
            filepath="${file#./}"
            dir=$(dirname "$filepath")

            if [ "$dir" != "." ]; then
              curl -sk -k \
                -H "Authorization: Basic $(echo -n '${{ secrets.FTP_USER }}:${{ secrets.FTP_PASS }}' | base64)" \
                "https://cyan.csam.montclair.edu:2083/execute/Fileman/mkdir?path=%2Fhome%2Fivanovs1%2Fpublic_html%2FUniFind&name=$(python3 -c 'import urllib.parse; print(urllib.parse.quote("'"$dir"'"))')" || true
            fi

            curl -sk -k \
              -H "Authorization: Basic $(echo -n '${{ secrets.FTP_USER }}:${{ secrets.FTP_PASS }}' | base64)" \
              "https://cyan.csam.montclair.edu:2083/execute/Fileman/upload_files?dir=%2Fhome%2Fivanovs1%2Fpublic_html%2FUniFind%2F$(python3 -c 'import urllib.parse; print(urllib.parse.quote("'"$dir"'"))')" \
              -F "file-1=@$file"
          done

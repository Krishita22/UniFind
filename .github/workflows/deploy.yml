name: Build & Deploy Flutter Web

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build Flutter web
        working-directory: unifind_flutter
        run: flutter build web --base-href /~ivanovs1/UniFind/

      - name: Deploy via SFTP
        run: |
          sshpass -P passphrase -p "${{ secrets.SSH_PASSPHRASE }}" sftp \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            ivanovs1@cyan.csam.montclair.edu <<EOF
          lcd unifind_flutter/build/web
          cd /home/ivanovs1/public_html/UniFind
          put -r .
          EOF

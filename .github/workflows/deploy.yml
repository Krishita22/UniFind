name: Build & Deploy Flutter Web

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Build Flutter web
        working-directory: unifind_flutter
        run: flutter build web --base-href /~ivanovs1/UniFind/

      - name: Deploy to cPanel via SFTP
        run: |
          sudo apt-get install -y sshpass
          sshpass -p "${{ secrets.FTP_PASS }}" sftp -o StrictHostKeyChecking=no -o Port=22 ${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }} <<EOF
          lcd unifind_flutter/build/web
          cd /home/ivanovs1/public_html/UniFind
          put -r .
          EOF

name: Build & Deploy Flutter Web

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build Flutter web
        working-directory: unifind_flutter
        run: flutter build web --base-href /~ivanovs1/UniFind/

      - name: Deploy via SCP
        run: |
          sshpass -P passphrase -p "${{ secrets.SSH_PASSPHRASE }}" \
            ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ivanovs1@cyan.csam.montclair.edu \
            "rm -rf /home/ivanovs1/public_html/UniFind && mkdir -p /home/ivanovs1/public_html/UniFind"
          sshpass -P passphrase -p "${{ secrets.SSH_PASSPHRASE }}" \
            scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -r \
            unifind_flutter/build/web/. \
            ivanovs1@cyan.csam.montclair.edu:/home/ivanovs1/public_html/UniFind/

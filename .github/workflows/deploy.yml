name: Build & Deploy Flutter Web

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Build Flutter web
        working-directory: unifind_flutter
        run: flutter build web --base-href /~ivanovs1/UniFind/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H cyan.csam.montclair.edu >> ~/.ssh/known_hosts

      - name: Deploy via SFTP
        run: |
          sshpass -P passphrase -p "${{ secrets.SSH_PASSPHRASE }}" sftp \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o BatchMode=no \
            ivanovs1@cyan.csam.montclair.edu <<EOF
          lcd unifind_flutter/build/web
          cd /home/ivanovs1/public_html/UniFind
          put -r .
          EOF
